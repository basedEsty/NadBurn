name: Refresh seed logos

# Regenerates artifacts/ash/src/lib/seed-logos.json from CoinGecko on a
# schedule and opens a PR with the diff. The bundled seed is what makes
# common token rows render with the correct logo on first paint, before
# the runtime Uniswap + CoinGecko lists finish loading. Without this
# job, the file drifts as global market-cap rankings shift and as new
# Monad blue chips appear.
#
# Why a PR (not a direct push to main):
#   • a human can eyeball the diff (logo URLs, new symbols)
#   • blocks bad regenerations from auto-merging if a chain shrinks oddly
#     in a way that the in-script safety net didn't catch
#
# The script (scripts/src/build-seed-logos.ts) refuses to overwrite the
# checked-in file when CoinGecko returns a clearly degraded result
# (zero entries, or any chain shrinks by >30%), so a CoinGecko outage
# turns this workflow run red instead of silently committing a worse
# file. Re-run the workflow once CoinGecko recovers.

on:
  schedule:
    # Every Monday at 06:00 UTC. Off-peak for CoinGecko's free tier and
    # leaves the rest of the week for the resulting PR to be reviewed
    # and merged.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force:
        description: "Force-write even if the new file shrinks (REFRESH_FORCE=1)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate seed logos
        env:
          REFRESH_FORCE: ${{ inputs.force && '1' || '' }}
        run: pnpm --filter @workspace/scripts run build-seed-logos

      - name: Open pull request with refreshed seed logos
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh bundled seed-logos.json"
          title: "chore: refresh bundled seed-logos.json"
          body: |
            Automated weekly refresh of `artifacts/ash/src/lib/seed-logos.json`
            from CoinGecko's top markets + per-platform lists.

            Generated by `.github/workflows/refresh-seed-logos.yml`
            (script: `scripts/src/build-seed-logos.ts`).

            If this PR is empty (no file change), nothing drifted this week
            and it can be closed.
          branch: chore/refresh-seed-logos
          delete-branch: true
          add-paths: |
            artifacts/ash/src/lib/seed-logos.json
