<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NadBurn — Burn your Nads</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Burn or recover your dust tokens on Ethereum and Monad in seconds. A Web3 furnace for the bags you'd rather forget." />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Telegram, iMessage, Slack) -->
    <meta property="og:title" content="NadBurn — Burn your Nads" />
    <meta property="og:description" content="Burn or recover your dust tokens on Ethereum and Monad in seconds. A Web3 furnace for the bags you'd rather forget." />
    <meta property="og:image" content="https://nadburn.xyz/thumbnail.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://nadburn.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NadBurn" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NadBurn — Burn your Nads" />
    <meta name="twitter:description" content="Burn or recover your dust tokens on Ethereum and Monad in seconds. A Web3 furnace for the bags you'd rather forget." />
    <meta name="twitter:image" content="https://nadburn.xyz/thumbnail.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Loaded here (not via CSS @import) so the browser can fetch fonts in
         parallel with the JS bundle, cutting first-paint by ~150ms on
         3G/slow networks and avoiding a PostCSS reorder warning. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    >
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
